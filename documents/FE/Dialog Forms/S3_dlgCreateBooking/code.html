</div>

<div class="flex justify-between items-start">
<div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Confirm Booking</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Review your details and finalize your stay.</p>
</div>
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface hover:bg-surface-container-high transition-colors text-on-surface-variant">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<hr class="border-t border-surface-container-high w-full"/>

<section class="grid grid-cols-2 gap-unit">
<div class="bg-surface p-4 rounded-DEFAULT border border-transparent focus-within:border-secondary-fixed transition-colors">

<div class="font-body-md text-body-md text-on-surface flex items-center justify-between">
<span>Oct 12, 2024</span>
<span class="material-symbols-outlined text-on-surface-variant">calendar_today</span>
</div>
</div>
<div class="bg-surface p-4 rounded-DEFAULT border border-transparent focus-within:border-secondary-fixed transition-colors">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase mb-1">Check-out</label>
<div class="font-body-md text-body-md text-on-surface flex items-center justify-between">
<span>Oct 17, 2024</span>
<span class="material-symbols-outlined text-on-surface-variant">calendar_today</span>
</div>
</div>
</section>

<span class="material-symbols-outlined text-on-surface-variant">expand_more</span>
</div>
