<style>
        .mesh-bg {
            background-color: #fff8f4;
            background-image: 
                radial-gradient(at 80% 0%, hsla(353,59%,85%,0.5) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(158,45%,85%,0.5) 0px, transparent 50%);
        }

<body class="bg-background text-on-background mesh-bg min-h-screen flex flex-col font-['Be_Vietnam_Pro'] antialiased">
<!-- TopNavBar: Hidden on linear/transactional intent screens as per "Shell Visibility & Relevance (THE FILTER)" rules. This is a targeted flow. -->
<nav class="hidden md:flex flex-row items-center justify-between px-8 py-4 w-full bg-white/70 dark:bg-zinc-900/70 backdrop-blur-md border-b border-rose-100/20 shadow-sm shadow-rose-200/10 docked full-width top-0 z-50">
<div class="text-2xl font-bold text-zinc-800 dark:text-zinc-100 font-['Plus_Jakarta_SANS'] tracking-tight">NordicStay</div>
<div class="flex items-center space-x-6 text-zinc-400">
<button class="hover:bg-rose-50/50 p-2 rounded-full transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-rose-400">close</span>
</button>
</div>
</nav>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center p-4 md:p-container-padding relative">
<!-- Back Button (Mobile) -->
<a class="absolute top-4 left-4 md:hidden flex items-center justify-center w-10 h-10 bg-surface-container rounded-full text-on-surface shadow-sm active:scale-95 transition-transform" href="#">
<span class="material-symbols-outlined">arrow_back</span>
</a>
<div class="bg-surface/80 backdrop-blur-xl rounded-[40px] md:rounded-[48px] shadow-[0_20px_60px_rgba(123,84,85,0.05)] w-full max-w-[1000px] overflow-hidden flex flex-col md:flex-row relative z-10 border border-surface-variant/50">
<!-- Left Side: Atmospheric Image -->
<div class="hidden md:block w-1/2 relative bg-surface-container-high">
<img alt="Cozy luxury interior" class="absolute inset-0 w-full h-full object-cover rounded-l-[40px] md:rounded-l-[48px]" data-alt="Cozy modern scandinavian living room with soft natural light, plush neutral textures, minimalist wooden furniture, and a warm inviting atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB_JnZJLoc8LtzQda_iW0mjQk0hD-7GbEgUaTxZl2B3dSxwP7gmvYYblcA0tjhjaxk0m9UnVNEo9SrWwDu089NvWaKu6C3uneA-kAKdc0cLKlOhdOUSB89183GoK5jZj0FB8gz-tF4vIIaVGUEAU8njcIN2XUCuzcWsWL2DOTA0TxgX2pdCS0mMBA1Lq25RbDz71iSdnBmr9LzQxUdz7zFOpJc5R8Xqn7ahjWYPelxP_nJCa_hGe1VKeR16KZtJ3S3L8xUgOtYRyA"/>
<!-- Subtle Gradient Overlay -->
<div class="absolute inset-0 bg-gradient-to-r from-transparent to-surface/80 rounded-l-[40px] md:rounded-l-[48px]"></div>
</div>
<!-- Right Side: Form Content -->
<div class="w-full md:w-1/2 p-8 md:p-12 lg:p-16 flex flex-col justify-center bg-surface">
<div class="mb-8">
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-2">Start Your Hosting Journey</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Join our curated collection of premium stays.</p>
</div>
<form class="space-y-6">
<!-- Business License Number -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface ml-1" for="license">Business License Number</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">badge</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-lowest border border-outline-variant rounded-full text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary/30 focus:border-secondary transition-all font-body-md text-body-md placeholder:text-outline/60" id="license" name="license" placeholder="e.g. LIC-123456" type="text"/>
</div>
</div>
<!-- Tax Identification Code -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface ml-1" for="taxId">Tax Identification Code</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">account_balance</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-lowest border border-outline-variant rounded-full text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary/30 focus:border-secondary transition-all font-body-md text-body-md placeholder:text-outline/60" id="taxId" name="taxId" placeholder="e.g. 00-0000000" type="text"/>
</div>
</div>
<!-- Business Name -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface ml-1" for="businessName">Business Name</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">storefront</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-lowest border border-outline-variant rounded-full text-on-surface focus:outline-none focus:ring-2 focus:ring-secondary/30 focus:border-secondary transition-all font-body-md text-body-md placeholder:text-outline/60" id="businessName" name="businessName" placeholder="e.g. Nordic Retreats LLC" type="text"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start pt-2">
<div class="flex items-center h-6">
<input class="w-6 h-6 rounded-lg bg-surface-container-lowest border-outline-variant text-secondary focus:ring-secondary/30 focus:ring-offset-surface transition-transform active:scale-90 cursor-pointer" id="terms" name="terms" type="checkbox"/>
</div>
<div class="ml-3">
<label class="font-body-md text-body-md text-on-surface-variant cursor-pointer" for="terms">
                                I agree to the <a class="text-primary hover:underline font-medium" href="#">Hosting Terms &amp; Conditions</a> and acknowledge the privacy policy.
                            </label>
</div>
</div>
<!-- Submit Button -->
<div class="pt-6">
<button class="w-full py-4 px-8 bg-primary-container text-on-primary-container rounded-full font-label-md text-label-md hover:bg-primary-fixed-dim focus:outline-none focus:ring-4 focus:ring-primary-container/50 active:scale-[0.98] transition-all duration-200 flex items-center justify-center space-x-2 border border-white/20 shadow-sm shadow-primary-container/20" type="submit">
<span>Submit Application</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</form>
